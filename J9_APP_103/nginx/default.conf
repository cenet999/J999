# Expo Web 静态站：压缩 + 带 hash 资源强缓存，减轻首包与重复访问体积/耗时
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 构建产物文件名含内容 hash，可长期缓存
    location /_expo/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        default_type text/plain;
        return 200 "ok";
    }
}
